services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - OLLAMA_HOST
      - OLLAMA_MODEL
      - SESSION_SECRET
      - SYSTEM_PROMPT
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

volumes:
  ollama: {}
