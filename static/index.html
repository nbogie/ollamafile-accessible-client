<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OllamaFile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font: 1.25rem/1.5 system-ui, -apple-system, sans-serif;
      max-width: 60rem;
      margin: 1rem auto;
      padding: 0 1rem;
      color: #111;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    h2 { font-size: 1.25rem; margin: 1.5rem 0 0.5rem; }
    label { display: block; font-weight: bold; margin-top: 0.5rem; }
    textarea {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      padding: 0.5rem;
      margin-top: 0.25rem;
    }
    button {
      font: inherit;
      padding: 0.5rem 1rem;
      margin: 0.5rem 0.5rem 0 0;
      cursor: pointer;
    }
    /* Loud focus ring for sighted keyboard users — :focus-visible only,
       so mouse clicks don't leave outlines on buttons. */
    :focus-visible {
      outline: 3px solid #0a58ff;
      outline-offset: 2px;
    }
    /* Visually hidden but exposed to assistive tech. */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    #status { padding: 0.5rem 0; color: #444; min-height: 1.5em; }
    #response-live {
      padding: 0.75rem;
      margin: 0.5rem 0;
      border: 1px solid #ccc;
      min-height: 2em;
      white-space: pre-wrap;
      background: #fafafa;
    }
    #response-live:empty::before {
      content: "(no response yet)";
      color: #888;
    }
    /* Each streamed sentence is its own <p> child so VoiceOver treats it
       as a discrete log entry and queues announcements. Block-level with
       tight margins so the structure is visually obvious during testing. */
    #response-live p { margin: 0 0 0.5em 0; padding: 0; }
    #response-live p:last-child { margin-bottom: 0; }
    #history { list-style: none; padding: 0; margin: 0; }
    #history li {
      margin: 0.5rem 0;
      padding: 0.75rem;
      border-radius: 4px;
    }
    #history li.user { background: #eef4ff; }
    #history li.assistant { background: #eefaee; }
    #history .role {
      font-weight: bold;
      display: block;
      margin-bottom: 0.25rem;
    }
    #history .content { white-space: pre-wrap; }
    #history:empty::before {
      content: "No messages yet.";
      color: #888;
      display: block;
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
  <main aria-label="OllamaFile chat">
    <h1>OllamaFile</h1>

    <form id="chat-form" aria-label="Send a prompt">
      <label for="prompt">Your message</label>
      <textarea id="prompt" name="prompt" rows="3" autofocus
                aria-label="Prompt — press Enter to send"></textarea>
      <!-- Sighted/mouse-only button. Screen reader and keyboard users
           submit via Enter in the textarea (announced in its aria-label),
           so we hide this from AT and the tab order to avoid VoiceOver
           announcing a redundant "press Ctrl-Option-Space" hint on every
           focus. -->
      <button type="submit" id="send" aria-hidden="true" tabindex="-1">Send</button>
      <button type="button">Copy</button>
      <button type="button" id="new-convo" aria-label="Start a new conversation">New conversation</button>
      <button type="button" id="stop-btn"
              aria-label="Stop response (Escape key)"
              aria-keyshortcuts="Escape">Stop</button>
      <button type="button">Toggle status updates</button>
      <button type="button">Send feedback to Neill</button>
    </form>

    <div id="status" role="status" aria-live="polite"></div>
    <!-- Assertive companion for errors only — interrupts polite speech so the
         user hears the failure immediately. Visually hidden; visible feedback
         is in #status. -->
    <div id="alert" role="alert" class="sr-only"></div>

    <h2>Current response</h2>
    <!-- Visible only — NOT a live region. VoiceOver+Safari interrupts itself
         when a single polite region keeps changing during streaming. Audio
         announcement happens via the double-buffered #live-a / #live-b
         pair below. -->
    <div id="response-live" aria-label="Streaming response"></div>
    <!-- Hidden single live region. Chunks arrive from the server faster
         than VoiceOver can speak them, so a JS queue throttles writes
         here based on estimated read time per chunk. -->
    <div id="live-announcer" class="sr-only" aria-live="polite"></div>

    <h2>Conversation history</h2>
    <ul id="history" aria-label="Conversation history"></ul>

    <footer style="margin-top: 2rem; color: #888; font-size: 0.875rem;">
      <span id="build-id">build 8</span>
    </footer>
  </main>

  <script>
    const form = document.getElementById('chat-form');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const newBtn = document.getElementById('new-convo');
    const stopBtn = document.getElementById('stop-btn');
    const statusEl = document.getElementById('status');
    const alertEl = document.getElementById('alert');
    const responseEl = document.getElementById('response-live');
    const liveAnnouncer = document.getElementById('live-announcer');
    const historyEl = document.getElementById('history');

    // Throttled announcement queue. Chunks arrive ~2s apart from the
    // server; VoiceOver takes ~5–10s to speak each sentence. Writing the
    // next chunk to the live region while VO is still mid-sentence
    // interrupts it. We instead estimate read time from word count
    // (~200 wpm + 30% safety) and wait that long between writes.
    const announceQueue = [];
    let announceBusy = false;

    function announceChunk(text) {
      announceQueue.push(text);
      if (!announceBusy) processAnnounceQueue();
    }

    function processAnnounceQueue() {
      if (announceQueue.length === 0) {
        announceBusy = false;
        return;
      }
      announceBusy = true;
      const text = announceQueue.shift();
      liveAnnouncer.textContent = text;
      const words = text.trim().split(/\s+/).filter(Boolean).length;
      const ms = Math.max(2000, (words / 200) * 60 * 1000 * 1.3);
      setTimeout(processAnnounceQueue, ms);
    }

    function resetAnnouncer() {
      announceQueue.length = 0;
      announceBusy = false;
      liveAnnouncer.textContent = '';
    }

    // After the stream ends we still want #status to clear from "Thinking…"
    // so sighted users see a "done" cue. We can't just setStatus immediately
    // because VoiceOver may still be working through the throttled
    // announcement queue, and writing to the polite #status region would
    // queue noise behind the last sentence. Poll until the announcer is
    // idle, then write once. Cancelled by sendPrompt / newBtn so it can't
    // overwrite a fresher status.
    let statusUpdateTimer = null;

    function cancelEndOfStreamStatus() {
      if (statusUpdateTimer) {
        clearTimeout(statusUpdateTimer);
        statusUpdateTimer = null;
      }
    }

    function scheduleEndOfStreamStatus() {
      cancelEndOfStreamStatus();
      const check = () => {
        if (announceBusy || announceQueue.length > 0) {
          statusUpdateTimer = setTimeout(check, 250);
          return;
        }
        statusUpdateTimer = null;
        if (!streaming) setStatus('Reply complete.');
      };
      statusUpdateTimer = setTimeout(check, 250);
    }

    // Tracks an in-flight stream so we can no-op a re-submit instead of
    // disabling the textarea (which forced a focus jump and interrupted
    // the last sentence in VoiceOver).
    let streaming = false;

    // Set while a fetch('/chat') is in flight so the Stop button can abort it.
    // Aborting closes the SSE connection; the server picks that up via
    // req.on('close') and cancels the upstream Ollama call.
    let currentAbortController = null;

    // Holds the just-finished assistant response until the next user
    // action. We don't move it to history or clear #response-live at
    // end-of-stream because doing so wipes the chunks underneath
    // VoiceOver while it's still announcing the last sentence. Server
    // already persists it (see GET /history).
    let pendingAssistantMessage = null;

    function finalizePending() {
      if (pendingAssistantMessage !== null) {
        appendHistoryItem('assistant', pendingAssistantMessage);
        pendingAssistantMessage = null;
      }
      responseEl.textContent = '';
      // Cancel any still-pending announcements from the previous turn so
      // they don't leak into the new turn.
      resetAnnouncer();
    }

    function setStatus(text) {
      statusEl.textContent = text;
      // Clear any previous error so it isn't re-announced on the next state change.
      if (alertEl.textContent) alertEl.textContent = '';
    }

    function reportError(message) {
      statusEl.textContent = `Error: ${message}`;
      alertEl.textContent = `Error: ${message}`;
    }

    // Reverse-chronological insertion: newest entries go to the top of the
    // list, nearest the prompt input and current response. The visual flow
    // from top to bottom is therefore latest → oldest.
    function appendHistoryItem(role, content) {
      const li = document.createElement('li');
      li.className = role;
      const roleEl = document.createElement('span');
      roleEl.className = 'role';
      roleEl.textContent = role === 'user' ? 'You' : 'Assistant';
      const contentEl = document.createElement('div');
      contentEl.className = 'content';
      contentEl.textContent = content;
      li.appendChild(roleEl);
      li.appendChild(contentEl);
      historyEl.prepend(li);
    }

    async function loadHistory() {
      try {
        const res = await fetch('/history');
        if (!res.ok) return;
        const { messages } = await res.json();
        historyEl.innerHTML = '';
        for (const m of messages) appendHistoryItem(m.role, m.content);
      } catch (err) {
        reportError(`could not load history (${err.message})`);
      }
    }

    async function sendPrompt(prompt) {
      streaming = true;
      sendBtn.disabled = true;
      currentAbortController = new AbortController();
      cancelEndOfStreamStatus();
      // Move any pending previous response into history and clear the live
      // region — done up here, not at end-of-stream, so VoiceOver had a
      // chance to finish announcing the previous response uninterrupted.
      finalizePending();
      setStatus('Thinking…');

      appendHistoryItem('user', prompt);
      promptEl.value = '';
      let assistantBuffer = '';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
          signal: currentAbortController.signal,
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let finished = false;

        while (!finished) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const events = buf.split('\n\n');
          buf = events.pop();

          for (const evt of events) {
            const dataLine = evt.split('\n').find((l) => l.startsWith('data: '));
            if (!dataLine) continue;
            const payload = JSON.parse(dataLine.slice(6));

            if (payload.token) {
              assistantBuffer += payload.token;
              const visibleText = payload.token.trim();
              const chunk = document.createElement('p');
              chunk.textContent = visibleText;
              responseEl.appendChild(chunk);
              announceChunk(visibleText);
            } else if (payload.error) {
              throw new Error(payload.error);
            } else if (payload.done) {
              finished = true;
              break;
            }
          }
        }

        // Don't move to history, don't clear #response-live, don't update
        // #status. Any DOM mutation now races with VoiceOver finishing
        // the last sentence and tends to cut it off. Park the buffered
        // text in pendingAssistantMessage; finalizePending() runs at the
        // start of the next sendPrompt or on New conversation. Status
        // stays at "Thinking…" briefly — the natural audio silence after
        // the last sentence is the AT user's "done" cue. The visible
        // #status text is reset by scheduleEndOfStreamStatus once the
        // announcer queue drains, so sighted users see a "done" cue too.
        pendingAssistantMessage = assistantBuffer;
        scheduleEndOfStreamStatus();
      } catch (err) {
        // User pressed Stop: keep whatever tokens arrived so they're moved
        // into history on the next action, mirroring the server, which also
        // persists the partial reply. Don't report it as an error — the
        // assertive "Stopped." announcement is the user's confirmation.
        if (err.name === 'AbortError') {
          if (assistantBuffer) pendingAssistantMessage = assistantBuffer;
        } else {
          reportError(err.message);
          responseEl.textContent = '';
        }
      } finally {
        streaming = false;
        sendBtn.disabled = false;
        currentAbortController = null;
      }
    }

    function stopGeneration() {
      // No-op when there's nothing to interrupt. Lets users press the Stop
      // button or Escape with no consequence outside of an active reply.
      const reading = announceBusy || announceQueue.length > 0;
      if (!streaming && !reading) return;

      if (currentAbortController) currentAbortController.abort();
      resetAnnouncer();
      cancelEndOfStreamStatus();
      setStatus('Stopped.');
      // The #alert region is role="alert" — assertive — so writing to it
      // interrupts whatever the screen reader is currently saying. The
      // polite #live-announcer cannot do this; clearing its textContent
      // doesn't stop in-flight speech. Briefly hold "Stopped." then clear
      // so a subsequent real error can re-trigger the same region.
      alertEl.textContent = 'Stopped.';
      setTimeout(() => {
        if (alertEl.textContent === 'Stopped.') alertEl.textContent = '';
      }, 1500);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (streaming) return;
      const prompt = promptEl.value.trim();
      if (!prompt) return;
      sendPrompt(prompt);
    });

    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    stopBtn.addEventListener('click', stopGeneration);

    // Escape from anywhere on the page stops generation and narration.
    // Chosen because JAWS doesn't claim it in forms mode, Windows 11 doesn't
    // bind it at OS level, and it's the conventional chat-stop key. Use
    // capture so we beat anything else that might handle it.
    document.addEventListener(
      'keydown',
      (e) => {
        if (e.key === 'Escape') {
          stopGeneration();
        }
      },
      true,
    );

    newBtn.addEventListener('click', async () => {
      if (!confirm('Start a new conversation? Current history will be cleared.')) return;
      try {
        await fetch('/new', { method: 'POST' });
        historyEl.innerHTML = '';
        responseEl.textContent = '';
        resetAnnouncer();
        cancelEndOfStreamStatus();
        pendingAssistantMessage = null;
        setStatus('New conversation started.');
      } catch (err) {
        reportError(`could not start a new conversation (${err.message})`);
      }
      promptEl.focus();
    });

    loadHistory();
    promptEl.focus();
  </script>
</body>
</html>
