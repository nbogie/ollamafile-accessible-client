<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OllamaFile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font: 1.25rem/1.5 system-ui, -apple-system, sans-serif;
      max-width: 60rem;
      margin: 1rem auto;
      padding: 0 1rem;
      color: #111;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1rem; }
    h2 { font-size: 1.25rem; margin: 1.5rem 0 0.5rem; }
    label { display: block; font-weight: bold; margin-top: 0.5rem; }
    textarea {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      padding: 0.5rem;
      margin-top: 0.25rem;
    }
    button {
      font: inherit;
      padding: 0.5rem 1rem;
      margin: 0.5rem 0.5rem 0 0;
      cursor: pointer;
    }
    #status { padding: 0.5rem 0; color: #444; min-height: 1.5em; }
    #response-live {
      padding: 0.75rem;
      margin: 0.5rem 0;
      border: 1px solid #ccc;
      min-height: 2em;
      white-space: pre-wrap;
      background: #fafafa;
    }
    #response-live:empty::before {
      content: "(no response yet)";
      color: #888;
    }
    #history { list-style: none; padding: 0; margin: 0; }
    #history li {
      margin: 0.5rem 0;
      padding: 0.75rem;
      border-radius: 4px;
    }
    #history li.user { background: #eef4ff; }
    #history li.assistant { background: #eefaee; }
    #history .role {
      font-weight: bold;
      display: block;
      margin-bottom: 0.25rem;
    }
    #history .content { white-space: pre-wrap; }
    #history:empty::before {
      content: "No messages yet.";
      color: #888;
      display: block;
      padding: 0.5rem 0;
    }
  </style>
</head>
<body>
  <h1>OllamaFile</h1>

  <form id="chat-form" aria-label="Send a prompt">
    <label for="prompt">Your message</label>
    <textarea id="prompt" name="prompt" rows="3" autofocus
              aria-label="Prompt — press Enter to send, Shift+Enter for a new line"></textarea>
    <button type="submit" id="send" aria-label="Send prompt">Send</button>
    <button type="button" id="new-convo" aria-label="Start a new conversation">New conversation</button>
  </form>

  <div id="status" role="status" aria-live="polite"></div>

  <h2>Current response</h2>
  <div id="response-live" aria-live="polite" aria-label="Streaming response"></div>

  <h2>Conversation history</h2>
  <ul id="history" aria-label="Conversation history"></ul>

  <script>
    const form = document.getElementById('chat-form');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const newBtn = document.getElementById('new-convo');
    const statusEl = document.getElementById('status');
    const responseEl = document.getElementById('response-live');
    const historyEl = document.getElementById('history');

    function appendHistoryItem(role, content) {
      const li = document.createElement('li');
      li.className = role;
      const roleEl = document.createElement('span');
      roleEl.className = 'role';
      roleEl.textContent = role === 'user' ? 'You' : 'Assistant';
      const contentEl = document.createElement('div');
      contentEl.className = 'content';
      contentEl.textContent = content;
      li.appendChild(roleEl);
      li.appendChild(contentEl);
      historyEl.appendChild(li);
    }

    async function loadHistory() {
      try {
        const res = await fetch('/history');
        if (!res.ok) return;
        const { messages } = await res.json();
        historyEl.innerHTML = '';
        for (const m of messages) appendHistoryItem(m.role, m.content);
      } catch (err) {
        statusEl.textContent = `Could not load history: ${err.message}`;
      }
    }

    async function sendPrompt(prompt) {
      sendBtn.disabled = true;
      promptEl.disabled = true;
      statusEl.textContent = 'Thinking…';
      const startedAt = Date.now();

      appendHistoryItem('user', prompt);
      promptEl.value = '';
      responseEl.textContent = '';
      let assistantBuffer = '';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          throw new Error(body.error || `HTTP ${res.status}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';
        let finished = false;

        while (!finished) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const events = buf.split('\n\n');
          buf = events.pop();

          for (const evt of events) {
            const dataLine = evt.split('\n').find((l) => l.startsWith('data: '));
            if (!dataLine) continue;
            const payload = JSON.parse(dataLine.slice(6));

            if (payload.token) {
              assistantBuffer += payload.token;
              // Append a text node rather than reassigning textContent so screen
              // readers only announce the new token, not the whole buffer.
              responseEl.appendChild(document.createTextNode(payload.token));
            } else if (payload.error) {
              throw new Error(payload.error);
            } else if (payload.done) {
              finished = true;
              break;
            }
          }
        }

        appendHistoryItem('assistant', assistantBuffer);
        responseEl.textContent = '';
        const elapsed = ((Date.now() - startedAt) / 1000).toFixed(1);
        statusEl.textContent = `Done (${elapsed}s).`;
      } catch (err) {
        statusEl.textContent = `Error: ${err.message}`;
        responseEl.textContent = '';
      } finally {
        sendBtn.disabled = false;
        promptEl.disabled = false;
        promptEl.focus();
      }
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const prompt = promptEl.value.trim();
      if (!prompt) return;
      sendPrompt(prompt);
    });

    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    newBtn.addEventListener('click', async () => {
      if (!confirm('Start a new conversation? Current history will be cleared.')) return;
      try {
        await fetch('/new', { method: 'POST' });
        historyEl.innerHTML = '';
        responseEl.textContent = '';
        statusEl.textContent = 'New conversation started.';
      } catch (err) {
        statusEl.textContent = `Error starting new conversation: ${err.message}`;
      }
      promptEl.focus();
    });

    loadHistory();
    promptEl.focus();
  </script>
</body>
</html>
